    'uniform vec4 uT[' + NB + '];', // 速度方向に伸びる尻尾
    '',
    'float smin(float a, float b, float k){',
    '  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);',
    '  return mix(b, a, h) - k*h*(1.0-h);',
    '}',
    '',
    'float map(vec3 p){',
    '  float d = 1e5;',
    '  for(int i = 0; i < ' + NB + '; i++){',
    '    d = smin(d, length(p - uB[i].xyz) - uB[i].w, 0.42);',
    '    // 尻尾：動くと本体から伸びて、生き物のように引き伸ばされる',
    '    d = smin(d, length(p - uT[i].xyz) - uT[i].w, 0.5);',
    '  }',
    '  // 液面のさざなみ：複数周波数の微細な変位',
    '  float w = 0.0;',
    '  w += sin(p.x*7.0 + uTime*1.3) * sin(p.y*6.0 - uTime*1.1) * 0.006;',
    '  w += sin(p.y*13.0 + p.z*9.0 + uTime*2.1) * 0.0035;',
    '  w += sin((p.x+p.y+p.z)*21.0 - uTime*3.0) * 0.0016;',
    '  return d + w;',
    '}',
    '',
    'vec3 calcN(vec3 p){',
    '  vec2 e = vec2(0.0022, -0.0022);',
    '  return normalize(',
    '    e.xyy*map(p+e.xyy) + e.yyx*map(p+e.yyx) +',
    '    e.yxy*map(p+e.yxy) + e.xxx*map(p+e.xxx));',
    '}',
    '',
    '// 絵の具の色：ビビッドオレンジ #FE5E00（リニア空間）',
    'vec3 VIVID = vec3(1.0, 0.115, 0.0);',
    '',
    '// 白いスタジオ環境',
    'vec3 envW(vec3 d){',
    '  vec3 sky = mix(vec3(0.78, 0.785, 0.795), vec3(1.12, 1.12, 1.12), smoothstep(-0.55, 0.6, d.y));',
    '  sky += vec3(0.55) * pow(max(d.y, 0.0), 7.0);',
    '  float win = pow(max(0.0, sin(d.x*2.5 + d.y*1.2 + 2.2)), 60.0);',
    '  sky += vec3(0.8) * win;',
    '  return sky;',
    '}',
    '',
    'void main(){',
    '  vec2 uv = (gl_FragCoord.xy*2.0 - uRes) / min(uRes.x, uRes.y);',
    '',
    '  vec3 ro = vec3(0.0, 0.0, 3.4);',
    '  vec3 rd = normalize(vec3(uv, -1.9));',
    '',
    '  // 背景：ほぼ純白のフラット、ごく薄いビネットのみ',
    '  float vig = 1.0 - dot(uv*0.22, uv*0.22);',
    '  vec3 col = vec3(0.965, 0.966, 0.97) * vig;',
    '',
    '  float t = 0.0;',
    '  float d = 0.0;',
    '  bool hit = false;',
    '  for(int i = 0; i < 84; i++){',
    '    vec3 p = ro + rd*t;',
    '    d = map(p);',
    '    if(d < 0.0018){ hit = true; break; }',
    '    t += d * 0.8;',
    '    if(t > 9.0) break;',
    '  }',
    '',
    '  if(hit){',
    '    vec3 p = ro + rd*t;',
    '    vec3 n = calcN(p);',
    '    vec3 r = reflect(rd, n);',
    '    float ndv = max(dot(n, -rd), 0.0);',
    '    float fres = 0.04 + 0.96 * pow(1.0 - ndv, 4.0);',
    '',
    '    // ── 白い液体、白い艶 ──',
    '    vec3 white = vec3(0.955, 0.955, 0.96) * (0.60 + 0.40*ndv);',
    '',
    '    vec3 refW = envW(r);',
    '    float gloss = 0.10 + 0.90*fres;',
    '    vec3 col2 = mix(white, refW, gloss * 0.55);',
    '',
    '    // グレージング角をわずかに締めて輪郭を出す',
    '    col2 *= 1.0 - pow(1.0 - ndv, 5.0) * 0.20;',
    '',
    '    // 鋭い白のスペキュラ',
    '    vec3 L1 = normalize(vec3(0.45, 0.85, 0.55));',
    '    col2 += vec3(1.0) * pow(max(dot(r, L1), 0.0), 180.0) * 0.9;',
    '',
    '    col = col2;',
    '  } else {',
    '    // 背景にごく薄い環境光',
    '    col += envW(rd) * 0.012;',
    '  }',
    '',
    '  // フィルムグレイン（白地なので控えめ）',
    '  float g = fract(sin(dot(gl_FragCoord.xy + uTime*60.0, vec2(12.9898, 78.233))) * 43758.5453);',
    '  col += (g - 0.5) * 0.016;',
    '',
    '  col = pow(max(col, vec3(0.0)), vec3(0.4545));',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n');

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      throw new Error(gl.getShaderInfoLog(s) || 'shader error');
    }
    return s;
  }

  var prog;
  try {
    var vs = compile(gl.VERTEX_SHADER, vsSrc);
    var fs = compile(gl.FRAGMENT_SHADER, fsSrc);
    prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(prog) || 'link error');
    }
  } catch (e) {
    errEl.style.display = 'flex';
    errEl.textContent = 'シェーダーの初期化に失敗しました';
    return;
  }
  gl.useProgram(prog);

  var buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  var aP = gl.getAttribLocation(prog, 'aP');
  gl.enableVertexAttribArray(aP);
  gl.vertexAttribPointer(aP, 2, gl.FLOAT, false, 0, 0);

  var uRes = gl.getUniformLocation(prog, 'uRes');
  var uTime = gl.getUniformLocation(prog, 'uTime');
  var uB = gl.getUniformLocation(prog, 'uB');
  var uT = gl.getUniformLocation(prog, 'uT');

  var W = 0, H = 0, ready = false;
  var SCALE = 0.55;

  function resize() {
    var w = window.innerWidth || document.documentElement.clientWidth || 0;
    var h = window.innerHeight || document.documentElement.clientHeight || 0;
    if (w < 10 || h < 10) { ready = false; return; }
    W = w; H = h;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.max(2, Math.floor(W * dpr * SCALE));
    canvas.height = Math.max(2, Math.floor(H * dpr * SCALE));
    gl.viewport(0, 0, canvas.width, canvas.height);
    ready = true;
  }
  window.addEventListener('resize', resize);

  var blobs = [];
  for (var i = 0; i < NB; i++) {
    blobs.push({
      x: (Math.random() - 0.5) * 1.6,
      y: (Math.random() - 0.5) * 1.6,
      z: (Math.random() - 0.5) * 0.8,
      vx: 0, vy: 0, vz: 0,
      r: i === 0 ? 0.52 : 0.26 + Math.random() * 0.22,
      pulse: 0, pvel: 0,
      p1: Math.random() * 6.283,
      p2: Math.random() * 6.283,
      s1: 0.25 + Math.random() * 0.3,
      s2: 0.2 + Math.random() * 0.25
    });
  }
  var bData = new Float32Array(NB * 4);
  var tData = new Float32Array(NB * 4);

  var pointer = { x: 0, y: 0, px: 0, py: 0, vx: 0, vy: 0, active: false };
  var pulse = 0;
  var touchEnv = 0; // 操作の余韻。触ると1になり、放置でゆっくり0へ

  function toWorld(px, py) {
    var s = Math.min(W, H);
    var nx = (px / W) * 2 - 1;
    var ny = -((py / H) * 2 - 1);
    return [nx * (W / s) * 1.55, ny * (H / s) * 1.55];
  }

  var actx = null;
  var fx = null; // 共有FX: デジタルディレイ

  function initAudio() {
    if (actx) return;
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) actx = new AC();
      if (!actx) return;

      // ── Two Shell風のダブ・デジタルディレイバス ──
      var master = actx.createGain();
      master.gain.value = 0.9;
      master.connect(actx.destination);

      var delay = actx.createDelay(1.0);
      delay.delayTime.value = 0.165;
      var fb = actx.createGain();
      fb.gain.value = 0.34;
      var hp = actx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 600;
      var wet = actx.createGain();
      wet.gain.value = 0.0; // エコーオフ(戻すときは0.35に)

      delay.connect(hp); hp.connect(fb); fb.connect(delay);
      delay.connect(wet); wet.connect(master);

      var send = actx.createGain();
      send.gain.value = 1.0;
      send.connect(delay);

      // ノイズバッファ（ティック用）
      var nb = actx.createBuffer(1, actx.sampleRate * 0.1, actx.sampleRate);
      var nd = nb.getChannelData(0);
      for (var i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;

      fx = { master: master, send: send, noise: nb };
    } catch (e) { actx = null; fx = null; }
  }

  function out(node, sendAmt) {
    node.connect(fx.master);
    if (sendAmt > 0) {
      var s = actx.createGain();
      s.gain.value = sendAmt;
      node.connect(s); s.connect(fx.send);
    }
  }

  // ── Two Shell風SEキット ──

  // タイトなサブの太鼓
  function seSub(t) {
    var o = actx.createOscillator();
    var g = actx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(130, t);
    o.frequency.exponentialRampToValueAtTime(44, t + 0.09);
    g.gain.setValueAtTime(0.09, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
    o.connect(g); out(g, 0);
    o.start(t); o.stop(t + 0.15);
  }

  // 短いノイズティック
  function seTick(t) {
    var s = actx.createBufferSource();
    s.buffer = fx.noise;
    var f = actx.createBiquadFilter();
    f.type = 'highpass';
    f.frequency.value = 3500;
    var g = actx.createGain();
    g.gain.setValueAtTime(0.05, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.03);
    s.connect(f); f.connect(g); out(g, 0.4);
    s.start(t); s.stop(t + 0.04);
  }

  // バブル：ピッチが跳ね上がるブリップ
  function seBubble(t) {
    var o = actx.createOscillator();
    var g = actx.createGain();
    o.type = 'sine';
    var f0 = 180 + Math.random() * 160;
    var f1 = f0 * (4 + Math.random() * 4);
    o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(f1, t + 0.07 + Math.random() * 0.05);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.08, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g); out(g, 0.7);
    o.start(t); o.stop(t + 0.2);
  }

  // ボヨン：プラスチックのバネ
  function seBoing(t) {
    var o = actx.createOscillator();
    var g = actx.createGain();
    var lfo = actx.createOscillator();
    var lg = actx.createGain();
    o.type = 'triangle';
    var f0 = 250 + Math.random() * 200;
    o.frequency.setValueAtTime(f0 * 1.8, t);
    o.frequency.exponentialRampToValueAtTime(f0 * 0.7, t + 0.28);
    lfo.type = 'sine';
    lfo.frequency.setValueAtTime(26, t);
    lfo.frequency.exponentialRampToValueAtTime(9, t + 0.3);
    lg.gain.value = f0 * 0.35;
    lfo.connect(lg); lg.connect(o.frequency);
    g.gain.setValueAtTime(0.07, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
    o.connect(g); out(g, 0.5);
    o.start(t); lfo.start(t);
    o.stop(t + 0.35); lfo.stop(t + 0.35);
  }

  // ジップ：一瞬のライザー
  function seZip(t, up) {
    var o = actx.createOscillator();
    var f = actx.createBiquadFilter();
    var g = actx.createGain();
    o.type = 'sawtooth';
    f.type = 'bandpass';
    f.Q.value = 9;
    var a = up ? 260 : 3200;
    var b = up ? 3200 : 260;
    o.frequency.setValueAtTime(a, t);
    o.frequency.exponentialRampToValueAtTime(b, t + 0.09);
    f.frequency.setValueAtTime(a * 1.5, t);
    f.frequency.exponentialRampToValueAtTime(b * 1.5, t + 0.09);
    g.gain.setValueAtTime(0.05, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.11);
    o.connect(f); f.connect(g); out(g, 0.8);
    o.start(t); o.stop(t + 0.13);
  }

  // チャープ：ピッチアップした声ネタ風の高速3連
  function seChirp(t) {
    var scale = [0, 3, 7, 10, 12, 15];
    var root = 620 + Math.random() * 300;
    var n = 3 + Math.floor(Math.random() * 2);
    for (var i = 0; i < n; i++) {
      (function (i) {
        var tt = t + i * (0.055 + Math.random() * 0.02);
        var o = actx.createOscillator();
        var f = actx.createBiquadFilter();
        var g = actx.createGain();
        o.type = 'square';
        var note = root * Math.pow(2, scale[Math.floor(Math.random() * scale.length)] / 12);
        o.frequency.setValueAtTime(note * 0.8, tt);
        o.frequency.exponentialRampToValueAtTime(note, tt + 0.02);
        f.type = 'bandpass';
        f.frequency.value = note * 1.6;
        f.Q.value = 2.5;
        g.gain.setValueAtTime(0.0001, tt);
        g.gain.exponentialRampToValueAtTime(0.05, tt + 0.008);
        g.gain.exponentialRampToValueAtTime(0.0001, tt + 0.07);
        o.connect(f); f.connect(g); out(g, 0.9);
        o.start(tt); o.stop(tt + 0.09);
      })(i);
    }
  }

  // タップ：キットからランダムに組み合わせて鳴らす
  function plop() {
    if (!actx || !fx) return;
    try {
      if (actx.state === 'suspended') actx.resume();
      var t = actx.currentTime;
      seSub(t);
      seTick(t);
      var v = Math.random();
      if (v < 0.3) seBubble(t);
      else if (v < 0.55) seBoing(t);
      else if (v < 0.75) seChirp(t);
      else if (v < 0.9) seZip(t, true);
      else { seBubble(t); seChirp(t + 0.05); }
    } catch (e) {}
  }

  function getPos(e) {
    if (e.touches && e.touches.length) return [e.touches[0].clientX, e.touches[0].clientY];
    return [e.clientX, e.clientY];
  }
  function onDown(e) {
    e.preventDefault();
    var p = getPos(e);
    var w = toWorld(p[0], p[1]);
    pointer.x = w[0]; pointer.y = w[1]; pointer.active = true;
    pulse = 1.0;
    touchEnv = 1.0;
    // 衝撃波：タップ地点から全員が驚いて飛び退く + 膨張の連鎖
    var nearest = 0, nearestD = 1e9;
    for (var bi = 0; bi < NB; bi++) {
      var bb = blobs[bi];
      var ddx = bb.x - w[0], ddy = bb.y - w[1];
      var dl = Math.sqrt(ddx * ddx + ddy * ddy) + 0.3;
      var imp = 0.11 / dl;
      bb.vx += (ddx / dl) * imp;
      bb.vy += (ddy / dl) * imp;
      // 距離に応じて全員少し膨らむ
      bb.pvel += 0.10 / dl;
      if (dl < nearestD) { nearestD = dl; nearest = bi; }
    }
    // 一番近い塊は、びっくりするほど膨らむ
    blobs[nearest].pvel += 0.42;
    initAudio();
    plop();
  }
  function onMove(e) {
    e.preventDefault();
    var p = getPos(e);
    var w = toWorld(p[0], p[1]);
    pointer.vx = w[0] - pointer.x;
    pointer.vy = w[1] - pointer.y;
    pointer.x = w[0]; pointer.y = w[1];
    pointer.active = true;
    touchEnv = 1.0;
  }
  function onUp() { pointer.active = false; }

  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onUp);
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);

  var t0 = null;
  var shown = false;

  function frame(ts) {
    requestAnimationFrame(frame);
    if (!ready) { resize(); return; }
    if (t0 === null) t0 = ts;
    var time = (ts - t0) / 1000;

    if (!shown && time > 0.8) {
      shown = true;
      logo.setAttribute('class', 'on');
    }

    pulse *= 0.94;
    var energy = 0;

    // ── ブロブ同士の相互作用（表面張力っぽい引力と、めり込みの反発） ──
    for (var a = 0; a < NB; a++) {
      for (var c = a + 1; c < NB; c++) {
        var A = blobs[a], C = blobs[c];
        var dx = C.x - A.x, dy = C.y - A.y, dz = C.z - A.z;
        var dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 0.001;
        var sum = A.r + C.r;
        var nx = dx / dist, ny = dy / dist, nz = dz / dist;

        if (dist < sum * 0.75) {
          // 深くめり込んだら押し返す（液体の非圧縮性）
          var push = (sum * 0.75 - dist) * 0.035;
          A.vx -= nx * push; A.vy -= ny * push; A.vz -= nz * push;
          C.vx += nx * push; C.vy += ny * push; C.vz += nz * push;
        } else if (dist < sum * 1.8) {
          // 近距離では引き合う（表面張力・くっつく感じ）
          var pull = (dist - sum * 0.75) * 0.0018;
          A.vx += nx * pull; A.vy += ny * pull; A.vz += nz * pull;
          C.vx -= nx * pull; C.vy -= ny * pull; C.vz -= nz * pull;
        }
      }
    }

    for (var i = 0; i < NB; i++) {
      var b = blobs[i];
      var tx = Math.sin(time * b.s1 + b.p1) * 1.0
             + Math.sin(time * b.s2 * 2.7 + b.p2 * 2.0) * 0.15;
      var ty = Math.cos(time * b.s2 + b.p2) * 0.75
             + Math.cos(time * b.s1 * 3.1 + b.p1) * 0.12;
      var tz = Math.sin(time * b.s2 * 0.7 + b.p1) * 0.45;

      if (i === 0 && pointer.active) {
        tx = pointer.x; ty = pointer.y; tz = 0.3;
        // 指の速度を強く伝える（振り回せる）
        b.vx += pointer.vx * 0.16;
        b.vy += pointer.vy * 0.16;
      }

      // 質量: 大きい塊ほど重く、ゆっくり応答する
      var mass = b.r / 0.35;
      var k = 0.022 / mass;

      b.vx += (tx - b.x) * k;
      b.vy += (ty - b.y) * k;
      b.vz += (tz - b.z) * k;
      b.vx -= b.x * 0.002;
      b.vy -= b.y * 0.002;
      // 粘性抵抗: 速いほど強く効く（液体らしい減速）
      var sp = Math.sqrt(b.vx * b.vx + b.vy * b.vy + b.vz * b.vz);
      var drag = 0.972 - Math.min(0.04, sp * 0.35); // 滑走が長く、勢いが残る
      b.vx *= drag; b.vy *= drag; b.vz *= drag;
      b.x += b.vx; b.y += b.vy; b.z += b.vz;
      b.z = Math.max(-0.9, Math.min(0.9, b.z));

      // 膨張のバネ：ぼんっと膨らみ、震えながら戻る（戻り際に少し凹む）
      b.pulse += b.pvel;
      b.pvel += (0 - b.pulse) * 0.028;
      b.pvel *= 0.90;
      if (b.pulse < -0.25) b.pulse = -0.25;
      if (b.pulse > 2.2) b.pulse = 2.2;

      // 呼吸 + 移動速度に応じたぷるんとした脈動
      var wob = Math.sin(time * (7.0 + i * 1.3) + b.p1 * 3.0) * Math.min(0.34, sp * 4.5);
      var rr = b.r * (1 + Math.sin(time * 0.9 + b.p2) * 0.05 + wob + b.pulse * 1.5);
      if (rr < 0.1) rr = 0.1;

      bData[i * 4] = b.x;
      bData[i * 4 + 1] = b.y;
      bData[i * 4 + 2] = b.z;
      bData[i * 4 + 3] = rr;

      // 尻尾：速いほど後ろへ長く伸び、本体は細くなる（ストレッチ）
      var stretch = Math.min(2.2, sp * 16.0);
      tData[i * 4] = b.x - b.vx * stretch * 6.0;
      tData[i * 4 + 1] = b.y - b.vy * stretch * 6.0;
      tData[i * 4 + 2] = b.z - b.vz * stretch * 6.0;
      tData[i * 4 + 3] = rr * (0.55 + 0.25 / (1.0 + stretch));

      energy += sp * b.r;
    }

    if (pointer.active) {
      pointer.vx *= 0.8; pointer.vy *= 0.8;
    }

    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, time);
    gl.uniform4fv(uB, bData);
    gl.uniform4fv(uT, tData);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }

  resize();
  requestAnimationFrame(frame);
})();
</script>
